version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Tegucigalpa       # 🕒 Zona horaria local
      PGTZ: America/Tegucigalpa     # 🕒 PostgreSQL también usa esta TZ internamente
    ports:
      - "5456:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server: # <--- Cambiado de backend a server
    build:
      context: ./server # <--- Apunta a tu carpeta server
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
    depends_on:
      - db

  client: # <--- Cambiado de frontend a client
    build:
      context: ./client # <--- Apunta a tu carpeta client
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - server

volumes:
  pgdata: